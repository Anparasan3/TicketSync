name: TicketSync Poll

on:
  schedule:
    - cron: '0 9,21 * * *'  # twice daily at 09:00 and 21:00 UTC
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run poll
        run: bun run poll
        env:
          # Jira
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          # Use the automatic GitHub Actions token — commits and PRs appear as github-actions[bot]
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          # Email
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Commit updated state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master
          git add .ticketsync-state.json tickets.csv
          if git diff --staged --quiet; then
            echo "No changes — skipping"
            exit 0
          fi

          if git diff --staged --name-only | grep -q "tickets.csv"; then
            # New tickets were processed — raise a PR for visibility
            BRANCH="ticketsync/state-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "chore: ticketsync state update"
            git push origin "$BRANCH"
            gh pr create \
              --title "chore: ticketsync state update" \
              --body "Automated CSV and state update from TicketSync poll." \
              --base master \
              --head "$BRANCH"
          else
            # Only lastPolledAt changed — push directly, no review needed
            git commit -m "chore: ticketsync state update [skip ci]"
            git push origin master
          fi
